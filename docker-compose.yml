services:
  bento:
    build: .
    image: bento:dev
    container_name: bento-dev
    volumes:
      # Código fuente para hot-reload
      - ./src:/bento/src:cached
      - ./src-tauri/src:/bento/src-tauri/src:cached
      - ./src-tauri/icons:/bento/src-tauri/icons:cached
      - ./src-tauri/Cargo.toml:/bento/src-tauri/Cargo.toml:cached
      - ./src-tauri/tauri.conf.json:/bento/src-tauri/tauri.conf.json:cached
      - ./src-tauri/build.rs:/bento/src-tauri/build.rs:cached
      - ./index.html:/bento/index.html:cached
      - ./vite.config.ts:/bento/vite.config.ts:cached
      - ./tsconfig.json:/bento/tsconfig.json:cached
      # Cache de Rust para no recompilar entre contenedores
      - cargo-cache:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      - target-cache:/bento/src-tauri/target
      # X11 forwarding en Linux
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # PulseAudio socket (Linux)
      - ${XDG_RUNTIME_DIR:-/tmp}/pulse:/tmp/pulse:rw
    environment:
      - DISPLAY=${DISPLAY}
      - GDK_BACKEND=x11
      - WEBKIT_DISABLE_COMPOSITING_MODE=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - GALLIUM_DRIVER=llvmpipe
      - NO_AT_BRIDGE=1
      - PULSE_SERVER=${PULSE_SERVER:-host.docker.internal}
    stdin_open: true
    tty: true
    working_dir: /bento

volumes:
  cargo-cache:
  cargo-git:
  target-cache:
